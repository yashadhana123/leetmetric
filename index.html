<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeetMetric</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
       <h1>LeetMetric</h1>

       <div class="container-user">
        <p>Enter your user name below:</p>
        <div class="user-input">
            <input type="text" placeholder="Enter your username" id="user">
            <button id="btn">Search</button>
        </div>
       </div>
      <div class="container-stats">
        <div class="progress-contanier">


            <div class="progress-item">
                <div class="progress-easy  circle">
                    <span id="easy-label"></span>
                    Easy
                </div>
             </div>
               

                <div class="progress-item ">
                <div class="progress-medium  circle">
                    <span id="medium-label"></span>
                    Medium
                </div>
             </div>



             <div class="progress-item ">
                <div class="progress-hard  circle ">
                    <span id="hard-label"></span>
                    Hard
                </div>
               </div>
        </div>

              <div class="card-container">
               <!-- directly populate card here through java script code -->
              </div>
      </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
